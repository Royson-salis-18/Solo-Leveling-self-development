<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    padding: 40px 20px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #080810;
    overflow-x: hidden;
  }

  /* ambient bg blobs */
  .bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }

  .grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    max-width: 1060px;
    margin: 0 auto;
  }

  .card {
    position: relative;
    border-radius: 20px;
    padding: 28px 22px 24px;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(.2,.8,.3,1), box-shadow 0.4s ease;
    /* glassmorphism base */
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .card:hover {
    transform: translateY(-4px);
  }

  /* canvas for effect — sits behind content */
  .card canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    opacity: 0.55;
  }

  /* glass tint overlay on top of canvas, below text */
  .card-glass {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    pointer-events: none;
    background: linear-gradient(160deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 100%);
    z-index: 1;
  }

  .card-content {
    position: relative;
    z-index: 2;
  }

  .card-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.4;
    margin-bottom: 14px;
    color: #fff;
    font-weight: 500;
  }

  .card-icon {
    font-size: 28px;
    margin-bottom: 10px;
    display: block;
    opacity: 0.9;
  }

  .card-name {
    font-size: 17px;
    font-weight: 600;
    color: rgba(255,255,255,0.88);
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .card-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
  }

  .card-rank {
    position: absolute;
    top: 20px;
    right: 18px;
    z-index: 2;
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.3);
    font-weight: 600;
  }

  /* subtle border accent per card type */
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    border: 1px solid var(--accent-border, rgba(255,255,255,0.08));
    pointer-events: none;
    z-index: 3;
  }
</style>
</head>
<body>

<!-- ambient bg -->
<div class="bg-blob" style="width:400px;height:400px;background:#4400ff;top:-80px;left:-100px;"></div>
<div class="bg-blob" style="width:350px;height:350px;background:#ff2200;top:200px;right:-80px;"></div>
<div class="bg-blob" style="width:300px;height:300px;background:#0044ff;bottom:0;left:30%;"></div>

<div class="grid" id="grid"></div>

<script>
const CARDS = [
  {
    icon: '◆',
    name: 'Shadow Monarch',
    sub: 'Arise',
    rank: 'S-RANK',
    label: 'shadow',
    accentBorder: 'rgba(120,60,255,0.25)',
    effectType: 'shadow',
    col: [[80, 20, 220], [60, 0, 180], [100, 40, 240]],
    glow: '70,10,200'
  },
  {
    icon: '◉',
    name: 'Orc Disaster',
    sub: 'Genocide March',
    rank: 'A-RANK',
    label: 'flame',
    accentBorder: 'rgba(255,60,20,0.2)',
    effectType: 'flame',
    col: [[255, 50, 10], [220, 20, 0], [255, 100, 30]],
    glow: '240,40,0'
  },
  {
    icon: '◫',
    name: 'Death Miasma',
    sub: 'Plague Domain',
    rank: 'B-RANK',
    label: 'smoke',
    accentBorder: 'rgba(140,140,140,0.15)',
    effectType: 'smoke',
    col: [[110, 110, 115], [80, 80, 85], [130, 130, 135]],
    glow: '90,90,95'
  },
  {
    icon: '◇',
    name: 'Storm Sovereign',
    sub: 'Thunder Domain',
    rank: 'S-RANK',
    label: 'lightning',
    accentBorder: 'rgba(40,120,255,0.25)',
    effectType: 'lightning',
    col: [[40, 110, 255], [20, 80, 220], [60, 150, 255]],
    glow: '30,100,255'
  },
  {
    icon: '⬡',
    name: 'Divine Monarch',
    sub: 'Radiant Authority',
    rank: 'NATIONAL',
    label: 'flame',
    accentBorder: 'rgba(255,170,0,0.2)',
    effectType: 'flame',
    col: [[255, 160, 0], [230, 120, 0], [255, 200, 40]],
    glow: '240,140,0'
  },
  {
    icon: '◬',
    name: 'Poison Haze',
    sub: 'Toxic Sovereign',
    rank: 'A-RANK',
    label: 'smoke',
    accentBorder: 'rgba(0,200,60,0.15)',
    effectType: 'smoke',
    col: [[0, 180, 55], [0, 150, 35], [20, 210, 70]],
    glow: '0,170,45'
  },
  {
    icon: '◆',
    name: 'Blood Shadow',
    sub: 'Crimson Extraction',
    rank: 'SPECIAL',
    label: 'shadow',
    accentBorder: 'rgba(220,0,70,0.2)',
    effectType: 'shadow',
    col: [[210, 0, 65], [180, 0, 45], [240, 20, 85]],
    glow: '200,0,60'
  },
  {
    icon: '⬟',
    name: 'Holy Judgement',
    sub: 'Celestial Authority',
    rank: 'SS-RANK',
    label: 'flame',
    accentBorder: 'rgba(180,190,255,0.2)',
    effectType: 'flame',
    col: [[185, 195, 255], [165, 175, 245], [205, 215, 255]],
    glow: '175,185,255'
  }
];

// Build cards
const grid = document.getElementById('grid');
CARDS.forEach(cfg => {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.setProperty('--accent-border', cfg.accentBorder);
  card.innerHTML = `
    <canvas></canvas>
    <div class="card-glass"></div>
    <span class="card-rank">${cfg.rank}</span>
    <div class="card-content">
      <div class="card-label">${cfg.label}</div>
      <span class="card-icon">${cfg.icon}</span>
      <div class="card-name">${cfg.name}</div>
      <div class="card-sub">${cfg.sub}</div>
    </div>
  `;
  grid.appendChild(card);

  const canvas = card.querySelector('canvas');
  const io = new IntersectionObserver(e => {
    if (e[0].isIntersecting) { startEffect(canvas, cfg); io.disconnect(); }
  }, { threshold: 0.1 });
  io.observe(card);
  window.addEventListener('resize', () => {
    const r = card.getBoundingClientRect();
    canvas.width = r.width; canvas.height = r.height;
  });
});

function startEffect(canvas, cfg) {
  const ctx = canvas.getContext('2d');
  let w, h;
  function resize() {
    const r = canvas.parentElement.getBoundingClientRect();
    w = canvas.width = r.width;
    h = canvas.height = r.height;
  }
  resize();
  const { effectType: type, col, glow } = cfg;

  // ── FLAME ──────────────────────────────────────────
  if (type === 'flame') {
    let pts = [], t = 0;
    const spawn = (init) => {
      const c = col[Math.floor(Math.random() * col.length)];
      pts.push({
        x: w * 0.15 + Math.random() * w * 0.7,
        y: init ? Math.random() * h : h + 5,
        vx: (Math.random() - 0.5) * 0.7,
        vy: -(Math.random() * 1.4 + 0.5),
        sz: Math.random() * 7 + 3,
        a: 0, mA: Math.random() * 0.35 + 0.08,
        life: 0, mL: Math.random() * 80 + 60,
        wb: Math.random() * Math.PI * 2, c
      });
    };
    for (let i = 0; i < 22; i++) spawn(true);
    (function loop() {
      t++;
      ctx.clearRect(0, 0, w, h);
      if (Math.random() < 0.35) spawn(false);
      // soft base glow at bottom
      const p = Math.sin(t * 0.05) * 0.5 + 0.5;
      const bg = ctx.createRadialGradient(w / 2, h, 0, w / 2, h, h * 0.7);
      bg.addColorStop(0, `rgba(${glow},${0.07 * p})`);
      bg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = bg; ctx.fillRect(0, 0, w, h);

      pts = pts.filter(p => p.life < p.mL);
      for (const p of pts) {
        p.life++; p.wb += 0.07;
        const tt = p.life / p.mL;
        p.a = tt < 0.15 ? (tt / 0.15) * p.mA : p.mA * (1 - (tt - 0.15) / 0.85);
        p.x += p.vx + Math.sin(p.wb) * 0.5;
        p.y += p.vy;
        const sz = p.sz * (1 - tt * 0.4);
        const [r, g, b] = p.c;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(Math.sin(p.wb) * 0.25);
        const fg = ctx.createRadialGradient(0, 0, 0, 0, -sz, sz * 1.8);
        fg.addColorStop(0, `rgba(${r},${g},${b},${p.a})`);
        fg.addColorStop(0.5, `rgba(${r},${g},${b},${p.a * 0.3})`);
        fg.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.beginPath();
        ctx.ellipse(0, 0, sz * 0.55, sz * 1.5, 0, 0, Math.PI * 2);
        ctx.fillStyle = fg; ctx.fill();
        ctx.restore();
      }
      requestAnimationFrame(loop);
    })();
    return;
  }

  // ── SHADOW ─────────────────────────────────────────
  if (type === 'shadow') {
    let pts = [], t = 0;
    const tdrls = Array.from({ length: 4 }, () => ({
      x: w * 0.1 + Math.random() * w * 0.8,
      ph: Math.random() * Math.PI * 2,
      ht: Math.random() * 40 + 25
    }));
    const spawn = (init) => {
      const c = col[Math.floor(Math.random() * col.length)];
      pts.push({
        x: Math.random() * w,
        y: init ? Math.random() * h : h + 5,
        vx: (Math.random() - 0.5) * 1.2,
        vy: -(Math.random() * 0.8 + 0.25),
        sz: Math.random() * 11 + 5,
        a: 0, mA: Math.random() * 0.28 + 0.08,
        life: 0, mL: Math.random() * 110 + 80,
        wb: Math.random() * Math.PI * 2, sp: Math.random() * 0.4 + 0.7, c
      });
    };
    for (let i = 0; i < 20; i++) spawn(true);
    (function loop() {
      t++;
      ctx.clearRect(0, 0, w, h);
      if (Math.random() < 0.3) spawn(false);
      const p = Math.sin(t * 0.04) * 0.5 + 0.5;
      const bg = ctx.createRadialGradient(w / 2, h, 0, w / 2, h, h);
      bg.addColorStop(0, `rgba(${glow},${0.1 * p})`);
      bg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = bg; ctx.fillRect(0, 0, w, h);

      // tendrils
      for (const td of tdrls) {
        const tx = td.x + Math.sin(t * 0.025 + td.ph) * 12;
        const ht = td.ht * (0.7 + Math.sin(t * 0.04 + td.ph) * 0.3);
        const [r, g, b] = col[0];
        const tg = ctx.createLinearGradient(tx, h, tx, h - ht);
        tg.addColorStop(0, `rgba(${r},${g},${b},${0.25 * p})`);
        tg.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = tg;
        ctx.beginPath();
        ctx.ellipse(tx, h - ht * 0.25, 5 + Math.sin(t * 0.05 + td.ph) * 2, ht, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // ink blobs
      pts = pts.filter(p => p.life < p.mL);
      for (const p of pts) {
        p.life++; p.wb += 0.04;
        const tt = p.life / p.mL;
        p.a = tt < 0.1 ? (tt / 0.1) * p.mA : p.mA * (1 - (tt - 0.1) / 0.9);
        p.x += p.vx + Math.sin(p.wb) * 1.0;
        p.y += p.vy;
        const sz = p.sz * (1 + tt * 0.25);
        const [r, g, b] = p.c;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.wb * 0.2);
        ctx.globalAlpha = p.a;
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.beginPath();
        ctx.ellipse(0, 0, sz * p.sp, sz, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      requestAnimationFrame(loop);
    })();
    return;
  }

  // ── SMOKE ──────────────────────────────────────────
  if (type === 'smoke') {
    let pts = [], t = 0;
    const spawn = (init) => {
      const c = col[Math.floor(Math.random() * col.length)];
      pts.push({
        x: w * 0.05 + Math.random() * w * 0.9,
        y: init ? Math.random() * h : h + 5,
        vx: (Math.random() - 0.5) * 0.5,
        vy: -(Math.random() * 0.45 + 0.15),
        sz: Math.random() * 18 + 10,
        a: 0, mA: Math.random() * 0.18 + 0.06,
        life: 0, mL: Math.random() * 150 + 100,
        wb: Math.random() * Math.PI * 2, rot: (Math.random() - 0.5) * 0.012, c
      });
    };
    for (let i = 0; i < 18; i++) spawn(true);
    (function loop() {
      t++;
      ctx.clearRect(0, 0, w, h);
      if (Math.random() < 0.25) spawn(false);
      const p = Math.sin(t * 0.03) * 0.5 + 0.5;
      const bg = ctx.createRadialGradient(w / 2, h, 0, w / 2, h, h * 0.7);
      bg.addColorStop(0, `rgba(${glow},${0.05 * p})`);
      bg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = bg; ctx.fillRect(0, 0, w, h);

      pts = pts.filter(p => p.life < p.mL);
      for (const p of pts) {
        p.life++; p.wb += p.rot;
        const tt = p.life / p.mL;
        p.a = tt < 0.2 ? (tt / 0.2) * p.mA : tt < 0.7 ? p.mA : p.mA * (1 - (tt - 0.7) / 0.3);
        p.x += p.vx + Math.sin(t * 0.008 + p.wb) * 0.35;
        p.y += p.vy;
        const sz = p.sz * (1 + tt * 1.0);
        const [r, g, b] = p.c;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.wb);
        const sg = ctx.createRadialGradient(0, 0, 0, 0, 0, sz);
        sg.addColorStop(0, `rgba(${r},${g},${b},${p.a})`);
        sg.addColorStop(0.55, `rgba(${r},${g},${b},${p.a * 0.4})`);
        sg.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.beginPath(); ctx.arc(0, 0, sz, 0, Math.PI * 2);
        ctx.fillStyle = sg; ctx.fill();
        ctx.restore();
      }
      requestAnimationFrame(loop);
    })();
    return;
  }

  // ── LIGHTNING ──────────────────────────────────────
  if (type === 'lightning') {
    let bolts = [], orbs = [], t = 0;
    const spawnBolt = () => {
      const x = w * 0.15 + Math.random() * w * 0.7;
      const segs = []; let cx = x, cy = 0;
      while (cy < h + 10) {
        const nx = cx + (Math.random() - 0.5) * 45;
        const ny = cy + Math.random() * 25 + 12;
        segs.push([cx, cy, nx, ny]); cx = nx; cy = ny;
      }
      const branches = [];
      if (segs.length > 3) {
        const bi = Math.floor(segs.length * 0.35 + Math.random() * segs.length * 0.3);
        let [, , bcx, bcy] = segs[bi]; const bs = [];
        for (let i = 0; i < 3; i++) {
          const bnx = bcx + (Math.random() - 0.5) * 30;
          const bny = bcy + Math.random() * 18 + 6;
          bs.push([bcx, bcy, bnx, bny]); bcx = bnx; bcy = bny;
        }
        branches.push(bs);
      }
      const [r, g, b] = col[Math.floor(Math.random() * col.length)];
      bolts.push({ segs, branches, alpha: 0.85, life: 0, r, g, b });
    };
    const spawnOrb = () => {
      const [r, g, b] = col[0];
      orbs.push({
        x: w * 0.2 + Math.random() * w * 0.6,
        y: h * 0.2 + Math.random() * h * 0.6,
        radius: Math.random() * 8 + 4,
        a: 0, mA: Math.random() * 0.22 + 0.08,
        life: 0, mL: Math.random() * 70 + 50,
        vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
        r, g, b
      });
    };
    for (let i = 0; i < 3; i++) spawnOrb();
    (function loop() {
      t++;
      ctx.clearRect(0, 0, w, h);
      if (Math.random() < 0.045) spawnBolt();
      if (Math.random() < 0.025) spawnOrb();
      const p = Math.sin(t * 0.06) * 0.5 + 0.5;
      const bg = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, h);
      bg.addColorStop(0, `rgba(${glow},${0.07 * p})`);
      bg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = bg; ctx.fillRect(0, 0, w, h);

      orbs = orbs.filter(o => o.life < o.mL);
      for (const o of orbs) {
        o.life++; const tt = o.life / o.mL;
        o.a = tt < 0.2 ? (tt / 0.2) * o.mA : o.mA * (1 - (tt - 0.2) / 0.8);
        o.x += o.vx; o.y += o.vy;
        const og = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.radius * 2.5);
        og.addColorStop(0, `rgba(${o.r},${o.g},${o.b},${o.a})`);
        og.addColorStop(1, `rgba(${o.r},${o.g},${o.b},0)`);
        ctx.fillStyle = og;
        ctx.beginPath(); ctx.arc(o.x, o.y, o.radius * 2.5, 0, Math.PI * 2); ctx.fill();
      }

      bolts = bolts.filter(b => b.life < 16);
      for (const bolt of bolts) {
        bolt.life++; bolt.alpha *= 0.74;
        ctx.save(); ctx.globalAlpha = bolt.alpha;
        // glow pass
        ctx.strokeStyle = `rgba(${bolt.r},${bolt.g},${bolt.b},0.2)`;
        ctx.lineWidth = 5; ctx.lineCap = 'round';
        for (const [x1,y1,x2,y2] of bolt.segs) { ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }
        // core
        ctx.strokeStyle = `rgb(${bolt.r},${bolt.g},${bolt.b})`;
        ctx.lineWidth = bolt.life < 3 ? 1.8 : 0.8;
        for (const [x1,y1,x2,y2] of bolt.segs) { ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }
        // branches
        ctx.strokeStyle = `rgba(${bolt.r},${bolt.g},${bolt.b},0.45)`;
        ctx.lineWidth = 0.6;
        for (const bs of bolt.branches) for (const [x1,y1,x2,y2] of bs) { ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }
        // flash
        if (bolt.life < 2) { ctx.globalAlpha = 0.04; ctx.fillStyle = `rgb(${bolt.r},${bolt.g},${bolt.b})`; ctx.fillRect(0,0,w,h); }
        ctx.restore();
      }
      requestAnimationFrame(loop);
    })();
  }
}
</script>
</body>
</html>
