<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050508;
    min-height: 100vh;
    padding: 30px 16px;
    font-family: 'Georgia', serif;
    overflow-x: hidden;
  }
  h1 {
    text-align: center;
    color: #444;
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 30px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 22px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .card {
    position: relative;
    border-radius: 14px;
    padding: 26px 20px 22px;
    overflow: hidden;
    cursor: pointer;
    min-height: 230px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    transition: transform 0.3s ease;
    border: 1px solid transparent;
  }
  .card:hover { transform: translateY(-5px) scale(1.015); }
  .card canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .card-icon {
    position: relative;
    z-index: 2;
    font-size: 34px;
    margin-bottom: 8px;
    display: block;
  }
  .card-name {
    position: relative;
    z-index: 2;
    font-size: 16px;
    letter-spacing: 2px;
    margin-bottom: 3px;
    font-weight: bold;
  }
  .card-sub {
    position: relative;
    z-index: 2;
    font-size: 10px;
    letter-spacing: 3px;
    opacity: 0.55;
    font-family: sans-serif;
    text-transform: uppercase;
  }
  .card-rank {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 2;
    font-size: 10px;
    letter-spacing: 2px;
    opacity: 0.6;
    font-family: sans-serif;
  }
  .card-type-badge {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 2;
    font-size: 9px;
    letter-spacing: 2px;
    padding: 3px 8px;
    border-radius: 20px;
    font-family: sans-serif;
    text-transform: uppercase;
    border: 1px solid currentColor;
    opacity: 0.7;
  }
  .scanline {
    position: absolute;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
    opacity: 0.35;
  }
  .glitch-bar {
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    opacity: 0;
  }
  .card:hover .glitch-bar { animation: gbar 0.5s steps(1) infinite; }
  @keyframes gbar {
    0%   { opacity:0; }
    15%  { opacity:1; clip-path: inset(30% 0 60% 0); background: rgba(255,255,255,0.04); transform: translateX(-3px); }
    30%  { opacity:0; }
    55%  { opacity:1; clip-path: inset(70% 0 5% 0); background: rgba(255,255,255,0.03); transform: translateX(2px); }
    70%  { opacity:0; }
    90%  { opacity:1; clip-path: inset(10% 0 85% 0); background: rgba(255,255,255,0.05); transform: translateX(-1px); }
    100% { opacity:0; }
  }

  /* THEMES */
  .c-shadow  { background:#08080f; border-color:#3300aa33; color:#c0aaff; }
  .c-shadow .card-type-badge { color:#9966ff; }
  .c-flame   { background:#0f0600; border-color:#ff330033; color:#ffaa77; }
  .c-flame .card-type-badge { color:#ff6633; }
  .c-smoke   { background:#0a0a0a; border-color:#55555533; color:#aaaaaa; }
  .c-smoke .card-type-badge { color:#888888; }
  .c-lightning { background:#03050f; border-color:#0033ff33; color:#88bbff; }
  .c-lightning .card-type-badge { color:#4488ff; }
  .c-redshadow { background:#0f0208; border-color:#cc002255; color:#ff88bb; }
  .c-redshadow .card-type-badge { color:#ee2266; }
  .c-goldflame { background:#0f0800; border-color:#cc880044; color:#ffdd88; }
  .c-goldflame .card-type-badge { color:#ffaa22; }
  .c-greendark { background:#020d04; border-color:#00551133; color:#77ff99; }
  .c-greendark .card-type-badge { color:#33cc55; }
  .c-whitesmoke { background:#0c0c10; border-color:#aaaaff33; color:#dde0ff; }
  .c-whitesmoke .card-type-badge { color:#aaaadd; }
</style>
</head>
<body>
<h1>Power Aura System — Solo Leveling × Slime</h1>
<div class="grid" id="grid"></div>

<script>
/* ─── CARD DEFINITIONS ─── */
const CARDS = [
  {
    theme:'c-shadow', icon:'◆', name:'Shadow Extraction', sub:'Monarch of Shadows', rank:'S-RANK',
    effectType:'shadow',
    col:[[70,0,200],[90,0,160],[50,0,130]],
    baseGlow:'50,0,180'
  },
  {
    theme:'c-flame', icon:'◉', name:'Orc Disaster', sub:'Orc Monarch Aura', rank:'A-RANK',
    effectType:'flame',
    col:[[255,40,0],[220,10,0],[255,90,10]],
    baseGlow:'255,30,0'
  },
  {
    theme:'c-smoke', icon:'◫', name:'Death Miasma', sub:'Plague Domain', rank:'B-RANK',
    effectType:'smoke',
    col:[[100,100,100],[70,70,75],[120,115,120]],
    baseGlow:'80,80,85'
  },
  {
    theme:'c-lightning', icon:'◇', name:'Storm Sovereign', sub:'Ruler of Thunder', rank:'S-RANK',
    effectType:'lightning',
    col:[[30,100,255],[20,80,220],[50,140,255]],
    baseGlow:'20,80,255'
  },
  {
    theme:'c-redshadow', icon:'◆', name:'Blood Shadow', sub:'Crimson Extraction', rank:'SPECIAL',
    effectType:'shadow',
    col:[[200,0,60],[180,0,40],[230,10,80]],
    baseGlow:'200,0,60'
  },
  {
    theme:'c-goldflame', icon:'⬡', name:'Divine Monarch', sub:'Radiant Authority', rank:'NATIONAL',
    effectType:'flame',
    col:[[255,160,0],[220,120,0],[255,200,30]],
    baseGlow:'240,140,0'
  },
  {
    theme:'c-greendark', icon:'◬', name:'Poison Haze', sub:'Toxic Miasma Lord', rank:'A-RANK',
    effectType:'smoke',
    col:[[0,180,50],[0,150,30],[20,200,60]],
    baseGlow:'0,160,40'
  },
  {
    theme:'c-whitesmoke', icon:'⬟', name:'Holy Judgement', sub:'Celestial Authority', rank:'SS-RANK',
    effectType:'flame',
    col:[[190,200,255],[170,180,240],[210,215,255]],
    baseGlow:'180,190,255'
  }
];

/* ─── BUILD CARDS ─── */
const grid = document.getElementById('grid');
CARDS.forEach((cfg, idx) => {
  const card = document.createElement('div');
  card.className = `card ${cfg.theme}`;
  card.innerHTML = `
    <canvas></canvas>
    <div class="glitch-bar"></div>
    <div class="scanline"></div>
    <span class="card-rank">${cfg.rank}</span>
    <span class="card-type-badge">${cfg.effectType}</span>
    <span class="card-icon">${cfg.icon}</span>
    <div class="card-name">${cfg.name}</div>
    <div class="card-sub">${cfg.sub}</div>
  `;
  grid.appendChild(card);
  const canvas = card.querySelector('canvas');
  const io = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) {
      startEffect(canvas, cfg);
      io.disconnect();
    }
  }, {threshold: 0.1});
  io.observe(card);
  window.addEventListener('resize', () => {
    const r = card.getBoundingClientRect();
    canvas.width = r.width; canvas.height = r.height;
  });
});

/* ─── EFFECT ENGINE ─── */
function startEffect(canvas, cfg) {
  const ctx = canvas.getContext('2d');
  let w, h;
  function resize() {
    const r = canvas.parentElement.getBoundingClientRect();
    w = canvas.width = r.width;
    h = canvas.height = r.height;
  }
  resize();

  const type = cfg.effectType;
  const col = cfg.col;
  const glow = cfg.baseGlow;

  /* ── FLAME ── */
  if (type === 'flame') {
    let particles = [];
    function spawnF(init) {
      const c = col[Math.floor(Math.random()*col.length)];
      particles.push({
        x: w*0.1 + Math.random()*w*0.8,
        y: init ? Math.random()*h : h+10,
        vx: (Math.random()-0.5)*1.2,
        vy: -(Math.random()*2.2+0.8),
        size: Math.random()*10+4,
        alpha:0, maxAlpha: Math.random()*0.55+0.2,
        life:0, maxLife: Math.random()*70+50,
        col:c, wobble: Math.random()*Math.PI*2
      });
    }
    for(let i=0;i<35;i++) spawnF(true);
    let t=0;
    (function loop(){
      t++;
      ctx.clearRect(0,0,w,h);
      if(Math.random()<0.5) spawnF(false);
      // base glow
      const pulse = Math.sin(t*0.06)*0.5+0.5;
      const bg = ctx.createRadialGradient(w/2,h,0,w/2,h,h*0.9);
      bg.addColorStop(0,`rgba(${glow},${0.15*pulse})`);
      bg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);

      particles = particles.filter(p=>p.life<p.maxLife);
      for(const p of particles){
        p.life++;
        const tt=p.life/p.maxLife;
        p.alpha = tt<0.15 ? (tt/0.15)*p.maxAlpha : p.maxAlpha*(1-(tt-0.15)/0.85);
        p.wobble+=0.08;
        p.x += p.vx + Math.sin(p.wobble)*0.7;
        p.y += p.vy;
        const sz = p.size*(1-tt*0.5);
        const [r,g,b]=p.col;
        ctx.save();
        ctx.translate(p.x,p.y);
        ctx.rotate(Math.sin(p.wobble)*0.3);
        const fg=ctx.createRadialGradient(0,0,0,0,-sz,sz*2);
        fg.addColorStop(0,`rgba(${r},${g},${b},${p.alpha})`);
        fg.addColorStop(0.5,`rgba(${r},${g},${b},${p.alpha*0.4})`);
        fg.addColorStop(1,`rgba(${r},${g},${b},0)`);
        ctx.beginPath();
        ctx.ellipse(0,0,sz*0.6,sz*1.7,0,0,Math.PI*2);
        ctx.fillStyle=fg; ctx.fill();
        ctx.restore();
      }
      // glitch line
      if(Math.random()<0.015){
        const gy=Math.random()*h;
        const [r,g,b]=col[0];
        ctx.fillStyle=`rgba(${r},${g},${b},0.12)`;
        ctx.fillRect(0,gy,w,Math.random()*4+1);
      }
      requestAnimationFrame(loop);
    })();
    return;
  }

  /* ── SHADOW ── */
  if (type === 'shadow') {
    let particles = [], tendrils = [];
    function spawnS(init) {
      const c = col[Math.floor(Math.random()*col.length)];
      particles.push({
        x: Math.random()*w,
        y: init ? Math.random()*h : h+5,
        vx: (Math.random()-0.5)*2,
        vy: -(Math.random()*1.2+0.3),
        size: Math.random()*14+6,
        alpha:0, maxAlpha: Math.random()*0.45+0.15,
        life:0, maxLife: Math.random()*100+80,
        col:c, wobble:Math.random()*Math.PI*2,
        spread: Math.random()*0.5+0.8
      });
    }
    for(let i=0;i<30;i++) spawnS(true);
    // ground tendrils
    const numT = 5;
    for(let i=0;i<numT;i++){
      tendrils.push({ x: w*0.1+Math.random()*w*0.8, phase: Math.random()*Math.PI*2, height:Math.random()*50+30 });
    }
    let t=0;
    (function loop(){
      t++;
      ctx.clearRect(0,0,w,h);
      const pulse=Math.sin(t*0.04)*0.5+0.5;
      // dark base glow bottom
      const bg=ctx.createRadialGradient(w/2,h,0,w/2,h,h);
      bg.addColorStop(0,`rgba(${glow},${0.2*pulse})`);
      bg.addColorStop(0.5,`rgba(${glow},${0.06*pulse})`);
      bg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);

      // tendrils rising from bottom
      for(const td of tendrils){
        const tx=td.x+Math.sin(t*0.03+td.phase)*15;
        const th=td.height*(0.7+Math.sin(t*0.05+td.phase)*0.3);
        const [r,g,b]=col[0];
        const tg=ctx.createLinearGradient(tx,h,tx,h-th);
        tg.addColorStop(0,`rgba(${r},${g},${b},${0.5*pulse})`);
        tg.addColorStop(0.5,`rgba(${r},${g},${b},${0.2*pulse})`);
        tg.addColorStop(1,`rgba(${r},${g},${b},0)`);
        ctx.fillStyle=tg;
        ctx.beginPath();
        const tw2=6+Math.sin(t*0.07+td.phase)*3;
        ctx.ellipse(tx,h-th*0.3,tw2,th,0,0,Math.PI*2);
        ctx.fill();
        // dripping shadow blobs
        ctx.beginPath();
        ctx.ellipse(tx+Math.sin(t*0.04+td.phase)*8,h-th*0.7,tw2*0.5,tw2,0,0,Math.PI*2);
        ctx.fillStyle=`rgba(${r},${g},${b},${0.3*pulse})`;
        ctx.fill();
      }

      // particles (inky blobs flowing up)
      if(Math.random()<0.4) spawnS(false);
      particles=particles.filter(p=>p.life<p.maxLife);
      for(const p of particles){
        p.life++;
        const tt=p.life/p.maxLife;
        p.alpha=tt<0.1?(tt/0.1)*p.maxAlpha:p.maxAlpha*(1-(tt-0.1)/0.9);
        p.wobble+=0.05;
        p.x+=p.vx+Math.sin(p.wobble)*1.5;
        p.y+=p.vy;
        const sz=p.size*(1+tt*0.3);
        const [r,g,b]=p.col;
        // ink blob shape — irregular
        ctx.save();
        ctx.translate(p.x,p.y);
        ctx.rotate(p.wobble*0.3);
        ctx.globalAlpha=p.alpha;
        ctx.fillStyle=`rgb(${r},${g},${b})`;
        ctx.beginPath();
        ctx.ellipse(0,0,sz*p.spread,sz,0,0,Math.PI*2);
        ctx.fill();
        // slight glow core
        const sg=ctx.createRadialGradient(0,0,0,0,0,sz*0.5);
        sg.addColorStop(0,`rgba(${Math.min(r+60,255)},${Math.min(g+40,255)},${Math.min(b+80,255)},${p.alpha*0.4})`);
        sg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=sg;
        ctx.ellipse(0,0,sz*0.5,sz*0.5,0,0,Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
      // glitch
      if(Math.random()<0.02){
        const gy=Math.random()*h;
        ctx.fillStyle=`rgba(${glow},0.1)`;
        ctx.fillRect(0,gy,w,Math.random()*3+1);
      }
      requestAnimationFrame(loop);
    })();
    return;
  }

  /* ── SMOKE ── */
  if (type === 'smoke') {
    let particles=[];
    function spawnSm(init){
      const c=col[Math.floor(Math.random()*col.length)];
      particles.push({
        x: w*0.05+Math.random()*w*0.9,
        y: init?Math.random()*h:h+5,
        vx:(Math.random()-0.5)*0.8,
        vy:-(Math.random()*0.7+0.2),
        size:Math.random()*22+12,
        alpha:0,maxAlpha:Math.random()*0.3+0.1,
        life:0,maxLife:Math.random()*140+100,
        col:c,wobble:Math.random()*Math.PI*2,
        rot:Math.random()*0.02-0.01
      });
    }
    for(let i=0;i<25;i++) spawnSm(true);
    let t=0;
    (function loop(){
      t++;
      ctx.clearRect(0,0,w,h);
      if(Math.random()<0.35) spawnSm(false);
      const pulse=Math.sin(t*0.03)*0.5+0.5;
      const bg=ctx.createRadialGradient(w/2,h,0,w/2,h,h*0.8);
      bg.addColorStop(0,`rgba(${glow},${0.06*pulse})`);
      bg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);

      particles=particles.filter(p=>p.life<p.maxLife);
      for(const p of particles){
        p.life++;
        const tt=p.life/p.maxLife;
        // smoke fades in slow, stays, fades out slow
        if(tt<0.2) p.alpha=(tt/0.2)*p.maxAlpha;
        else if(tt<0.7) p.alpha=p.maxAlpha;
        else p.alpha=p.maxAlpha*(1-(tt-0.7)/0.3);
        p.wobble+=p.rot;
        p.x+=p.vx+Math.sin(t*0.01+p.wobble)*0.5;
        p.y+=p.vy;
        const sz=p.size*(1+tt*1.2); // smoke GROWS as it rises
        const [r,g,b]=p.col;
        ctx.save();
        ctx.translate(p.x,p.y);
        ctx.rotate(p.wobble);
        // layered puff
        for(let layer=0;layer<3;layer++){
          const lsz=sz*(0.6+layer*0.3);
          const la=p.alpha*(1-layer*0.25);
          const sg=ctx.createRadialGradient(layer*4,layer*3,0,0,0,lsz);
          sg.addColorStop(0,`rgba(${r},${g},${b},${la})`);
          sg.addColorStop(0.6,`rgba(${r},${g},${b},${la*0.5})`);
          sg.addColorStop(1,`rgba(${r},${g},${b},0)`);
          ctx.beginPath();
          ctx.arc(layer*5,0,lsz,0,Math.PI*2);
          ctx.fillStyle=sg;ctx.fill();
        }
        ctx.restore();
      }
      // occasional glitch
      if(Math.random()<0.01){
        const gy=Math.random()*h;
        ctx.fillStyle=`rgba(${glow},0.08)`;
        ctx.fillRect(0,gy,w,Math.random()*2+1);
      }
      requestAnimationFrame(loop);
    })();
    return;
  }

  /* ── LIGHTNING ── */
  if (type === 'lightning') {
    let bolts=[], orbs=[];
    function spawnBolt(){
      const x=w*0.1+Math.random()*w*0.8;
      const segs=[];
      let cx=x, cy=0;
      while(cy<h+20){
        const nx=cx+(Math.random()-0.5)*55;
        const ny=cy+Math.random()*28+12;
        segs.push([cx,cy,nx,ny]);
        cx=nx;cy=ny;
      }
      const branches=[];
      if(segs.length>3){
        const bi=Math.floor(segs.length*0.3+Math.random()*segs.length*0.4);
        const [bx1,by1,bx2,by2]=segs[bi];
        let bcx=bx2,bcy=by2;
        const bsegs=[];
        for(let i=0;i<4;i++){
          const bnx=bcx+(Math.random()-0.5)*40;
          const bny=bcy+Math.random()*20+8;
          bsegs.push([bcx,bcy,bnx,bny]);
          bcx=bnx;bcy=bny;
        }
        branches.push(bsegs);
      }
      const [r,g,b]=col[Math.floor(Math.random()*col.length)];
      bolts.push({segs,branches,alpha:1,life:0,maxLife:14,r,g,b});
    }
    function spawnOrb(){
      const [r,g,b]=col[0];
      orbs.push({
        x:w*0.2+Math.random()*w*0.6,
        y:h*0.3+Math.random()*h*0.5,
        r:Math.random()*12+5,
        alpha:0,maxAlpha:Math.random()*0.5+0.2,
        life:0,maxLife:Math.random()*60+40,
        col:[r,g,b],
        vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4
      });
    }
    for(let i=0;i<4;i++) spawnOrb();
    let t=0;
    (function loop(){
      t++;
      ctx.clearRect(0,0,w,h);
      const pulse=Math.sin(t*0.07)*0.5+0.5;
      const bg=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,h);
      bg.addColorStop(0,`rgba(${glow},${0.1*pulse})`);
      bg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);

      // electric orbs floating
      if(Math.random()<0.03) spawnOrb();
      orbs=orbs.filter(o=>o.life<o.maxLife);
      for(const o of orbs){
        o.life++;
        const tt=o.life/o.maxLife;
        o.alpha=tt<0.2?(tt/0.2)*o.maxAlpha:o.maxAlpha*(1-(tt-0.2)/0.8);
        o.x+=o.vx;o.y+=o.vy;
        const [r,g,b]=o.col;
        ctx.save();
        const og=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r*2);
        og.addColorStop(0,`rgba(${r},${g},${b},${o.alpha})`);
        og.addColorStop(0.4,`rgba(${r},${g},${b},${o.alpha*0.5})`);
        og.addColorStop(1,`rgba(${r},${g},${b},0)`);
        ctx.fillStyle=og;
        ctx.beginPath();ctx.arc(o.x,o.y,o.r*2,0,Math.PI*2);ctx.fill();
        ctx.restore();
      }

      // lightning bolts
      if(Math.random()<0.08) spawnBolt();
      bolts=bolts.filter(b=>b.life<b.maxLife);
      for(const bolt of bolts){
        bolt.life++;
        bolt.alpha*=0.72;
        const a=bolt.alpha;
        ctx.save();
        ctx.globalAlpha=a;
        // outer glow pass
        ctx.strokeStyle=`rgba(${bolt.r},${bolt.g},${bolt.b},0.3)`;
        ctx.lineWidth=6;ctx.lineCap='round';
        for(const [x1,y1,x2,y2] of bolt.segs){
          ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
        }
        // core
        ctx.strokeStyle=`rgb(${bolt.r},${bolt.g},${bolt.b})`;
        ctx.lineWidth=bolt.life<3?2.5:1;
        for(const [x1,y1,x2,y2] of bolt.segs){
          ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
        }
        // white hot core
        ctx.strokeStyle='rgba(255,255,255,0.8)';
        ctx.lineWidth=bolt.life<2?1.5:0.5;
        for(const [x1,y1,x2,y2] of bolt.segs){
          ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
        }
        // branches
        ctx.strokeStyle=`rgba(${bolt.r},${bolt.g},${bolt.b},0.5)`;
        ctx.lineWidth=0.8;
        for(const bsegs of bolt.branches){
          for(const [x1,y1,x2,y2] of bsegs){
            ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
          }
        }
        ctx.restore();
        // flash on card
        if(bolt.life<3){
          ctx.save();
          ctx.globalAlpha=0.06*a;
          ctx.fillStyle=`rgb(${bolt.r},${bolt.g},${bolt.b})`;
          ctx.fillRect(0,0,w,h);
          ctx.restore();
        }
      }
      // glitch
      if(Math.random()<0.03){
        const gy=Math.random()*h;
        ctx.fillStyle=`rgba(${glow},0.15)`;
        ctx.fillRect(0,gy,w,Math.random()*5+1);
      }
      requestAnimationFrame(loop);
    })();
    return;
  }
}
</script>
