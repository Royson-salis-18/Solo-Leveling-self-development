
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.w { padding: 1.5rem 0; font-family: var(--font-sans); }
h2.sr-only { position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0); }
.filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.f-btn { padding: 5px 14px; border-radius: 999px; font-size: 12px; font-weight: 500; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-secondary); cursor: pointer; transition: all 0.12s; }
.f-btn.on { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
.f-btn:hover:not(.on) { background: var(--color-background-tertiary); }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; margin-bottom: 1.5rem; }
.stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.65rem 0.85rem; }
.stat-l { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 2px; }
.stat-v { font-size: 19px; font-weight: 500; color: var(--color-text-primary); }
.section-lbl { font-size: 11px; font-weight: 500; letter-spacing: 0.07em; color: var(--color-text-tertiary); text-transform: uppercase; margin: 1.25rem 0 0.6rem; }
.todo-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px; border-radius: var(--border-radius-md);
  border: 0.5px solid var(--color-border-tertiary);
  background: var(--color-background-primary);
  margin-bottom: 6px; cursor: pointer; transition: border-color 0.12s;
}
.todo-item:hover { border-color: var(--color-border-secondary); }
.todo-item.done { opacity: 0.45; }
.todo-item.done .ti-name { text-decoration: line-through; color: var(--color-text-tertiary); }
.chk {
  width: 18px; height: 18px; border-radius: 4px; border: 0.5px solid var(--color-border-secondary);
  background: var(--color-background-secondary); flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center; transition: all 0.12s;
}
.chk.checked { background: var(--color-text-primary); border-color: var(--color-text-primary); }
.chk i { font-size: 11px; color: var(--color-background-primary); display: none; }
.chk.checked i { display: block; }
.ti-main { flex: 1; min-width: 0; }
.ti-name { font-size: 13px; color: var(--color-text-primary); font-weight: 500; line-height: 1.4; }
.ti-desc { font-size: 12px; color: var(--color-text-secondary); margin-top: 3px; line-height: 1.4; }
.ti-meta { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; align-items: center; }
.tag { display: inline-flex; align-items: center; font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 999px; white-space: nowrap; }
.tag-new { background: #EEEDFE; color: #3C3489; }
.tag-improve { background: #E1F5EE; color: #085041; }
.tag-bl { background: #FAEEDA; color: #633806; }
.tag-core { background: #E6F1FB; color: #0C447C; }
.tag-ui { background: #FBEAF0; color: #72243E; }
.tag-p1 { background: #FCEBEB; color: #791F1F; }
.tag-p2 { background: #FAEEDA; color: #633806; }
.tag-p3 { background: #F1EFE8; color: #444441; }
@media (prefers-color-scheme: dark) {
  .tag-new { background: #3C3489; color: #CECBF6; }
  .tag-improve { background: #085041; color: #9FE1CB; }
  .tag-bl { background: #633806; color: #FAC775; }
  .tag-core { background: #0C447C; color: #B5D4F4; }
  .tag-ui { background: #72243E; color: #F4C0D1; }
  .tag-p1 { background: #791F1F; color: #F7C1C1; }
  .tag-p2 { background: #633806; color: #FAC775; }
  .tag-p3 { background: #444441; color: #D3D1C7; }
}
.progress-wrap { margin-bottom: 1.25rem; }
.progress-bar { height: 5px; background: var(--color-background-tertiary); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; background: var(--color-text-primary); transition: width 0.3s; }
.progress-lbl { display: flex; justify-content: space-between; font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 4px; }
.empty { padding: 2rem 0; text-align: center; font-size: 13px; color: var(--color-text-tertiary); }
</style>

<div class="w">
<h2 class="sr-only">Shadow Monarch system development todo list — new features and improvements</h2>

<div class="stats-row" id="stats-row"></div>

<div class="progress-wrap">
  <div class="progress-lbl"><span id="prog-lbl">0 of 0 objectives cleared</span><span id="prog-pct">0%</span></div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="filters">
  <button class="f-btn on" onclick="setFilter('all',this)">All</button>
  <button class="f-btn" onclick="setFilter('new',this)">New features</button>
  <button class="f-btn" onclick="setFilter('improve',this)">Improvements</button>
  <button class="f-btn" onclick="setFilter('bl',this)">Blue Lock logic</button>
  <button class="f-btn" onclick="setFilter('ui',this)">UI / UX</button>
  <button class="f-btn" onclick="setFilter('p1',this)">Priority 1</button>
</div>

<div id="list"></div>
</div>

<script>
const ITEMS = [
  {
    section: "Mode system (new)",
    items: [
      { id:"m1", name:"Mode selection screen", desc:"Onboarding gate where user picks Easy / Normal / Hard / Nightmare before first session. Show risk + reward summary per mode.", tags:["new","ui","p1"] },
      { id:"m2", name:"Mode-aware XP engine", desc:"Inject modeMultiplier into calculateEffectiveXp. All decay, penalty, and DM values read from a modeConfig object per session.", tags:["new","core","p1"] },
      { id:"m3", name:"Nightmare season lock", desc:"30-day lock-in timer displayed in header. Block mode-switch until season ends or DEFEAT state triggers.", tags:["new","core","p1"] },
      { id:"m4", name:"Mode badge on Dashboard", desc:"Persistent pill (Easy / Hard etc.) shown next to rank in HUD. Pulses red in Nightmare when DM > 70.", tags:["new","ui","p2"] },
      { id:"m5", name:"Mid-season mode upgrade path", desc:"Allow Easy → Normal or Normal → Hard upgrade (never downgrade) with a confirmation gate that shows XP implications.", tags:["new","core","p3"] },
    ]
  },
  {
    section: "Blue Lock logic additions",
    items: [
      { id:"bl1", name:"Ego score", desc:"Track a hidden 'Ego' stat that rises when user completes tasks they self-rated as difficult. High Ego unlocks Ego Burst mode (temporary +10% XP, 1hr).", tags:["new","bl","p1"] },
      { id:"bl2", name:"Zone state", desc:"Like Flow State but deeper — triggered by 5 tasks in 90 min. Enters 'Zone': UI shifts to minimal distraction mode, XP multiplier 2.5×, no notifications for 1hr.", tags:["new","bl","p1"] },
      { id:"bl3", name:"Rival system", desc:"User nominates a 'Rival' (another user or a personal weekly benchmark). Beating the rival's weekly XP unlocks a rival shadow extraction.", tags:["new","bl","p2"] },
      { id:"bl4", name:"Selection — weekly cut", desc:"Weekly ranking of top 11 tasks by impact. Completing 8+ of those 11 awards a 'Selection Survived' badge and +150 XP bonus.", tags:["new","bl","p2"] },
      { id:"bl5", name:"Devour mechanic", desc:"When a user completes a gate in a category they historically avoid, they 'devour' that weakness — category weight temporarily increases by +0.15 for 48h.", tags:["new","bl","p3"] },
      { id:"bl6", name:"Playmaker rating", desc:"End-of-week score (0–100) based on task completion rate, streak, Ego score, and DM level. Displayed like a player card stat.", tags:["new","bl","ui","p2"] },
    ]
  },
  {
    section: "Core engine improvements",
    items: [
      { id:"e1", name:"SS rank tier", desc:"Add SS rank above S. Only reachable in Nightmare. Requires Lv 101+ and season completion with < 30 DM accumulated.", tags:["improve","core","p1"] },
      { id:"e2", name:"Rank-down logic", desc:"Hard + Nightmare: evaluate rank-down trigger after Red Gate failure or 3 consecutive fails in 48h. Rank drops one tier with System notification.", tags:["improve","core","p1"] },
      { id:"e3", name:"Compounding decay (Nightmare)", desc:"Replace flat 1% decay with compounding: each inactive day multiplies prior balance by 0.97. Separate decay function per mode.", tags:["improve","core","p1"] },
      { id:"e4", name:"Dark Mana corruption at 50 DM", desc:"In Hard+: at 50 DM, randomly select one shadow and mark it 'corrupted' — its XP resonance drops to 0 until redemption is paid.", tags:["improve","core","p2"] },
      { id:"e5", name:"Shadow permadeath (Nightmare)", desc:"On Red Gate failure: 30% RNG check. If triggered, a random shadow is permanently removed. Log entry added to permanent record.", tags:["improve","core","p2"] },
      { id:"e6", name:"Overdue exponential formula fix", desc:"Replace linear penalty with: overduePenalty = 0.2 × XP × (1 + daysLate)^0.5. Cap at 80% total XP loss to avoid instant wipe.", tags:["improve","core","p1"] },
      { id:"e7", name:"Partial credit gates (Easy)", desc:"If ≥50% subtasks cleared before timer expires, award 60% XP instead of full fail. Flag in gate object as partialCreditEligible.", tags:["improve","core","p2"] },
    ]
  },
  {
    section: "Gate & dungeon improvements",
    items: [
      { id:"g1", name:"Gauntlet gate type", desc:"New gate type (Nightmare only): chain of 5 subtasks, no pause, must complete before shared timer. Fail any = full gate fail.", tags:["new","core","p1"] },
      { id:"g2", name:"Weekly Trial gate", desc:"Hard+: auto-spawn one mandatory S-rank gate per week (Mon 00:00). Skipping converts to Red Gate penalty at week end.", tags:["new","core","p1"] },
      { id:"g3", name:"Monarch's Judgment gate", desc:"Nightmare: Oracle assigns one auto-generated gate weekly from user's least-completed category. Refusing adds 20 DM.", tags:["new","core","p2"] },
      { id:"g4", name:"Gate tier colour coding", desc:"F-rank gates neutral gray, C blue, B purple, A amber, S coral/red. Red Gate gets animated red border (CSS keyframe, no glow).", tags:["improve","ui","p2"] },
      { id:"g5", name:"Oath system", desc:"Hard+: weekly XP target commitment. If missed by >30%, apply −5% passive XP debuff to all categories for 48h. Oath set on Monday.", tags:["new","core","p2"] },
    ]
  },
  {
    section: "Oracle AI upgrades",
    items: [
      { id:"o1", name:"Mode-locked Oracle voice", desc:"Oracle tone switches per mode: Encouragement (Easy), Auditor+Architect (Normal), Commander (Hard), Shadow Monarch voice (Nightmare). Prompt prefix in OracleService.", tags:["improve","core","p1"] },
      { id:"o2", name:"Permanent record awareness", desc:"Nightmare Oracle references the user's season record (shadow deaths, past DEFEATs, Judgment refusals) in its prompts for continuity.", tags:["new","core","p2"] },
      { id:"o3", name:"Mandatory redemption quest", desc:"Hard+: Oracle can assign a structured redemption quest (3-step task sequence) when DM > 30. User must complete it to unlock market/arsenal.", tags:["new","core","p2"] },
      { id:"o4", name:"Devour feedback", desc:"Oracle flags when user 'devours' a weak category and narrates it like a Blue Lock-style breakthrough moment.", tags:["new","bl","p3"] },
    ]
  },
  {
    section: "UI / UX",
    items: [
      { id:"u1", name:"Playmaker card view", desc:"End-of-week summary screen styled as a player card (Blue Lock aesthetic): shows Playmaker Rating, top gate, Ego score, DM delta, XP gained.", tags:["new","bl","ui","p2"] },
      { id:"u2", name:"Zone state visual", desc:"When Zone state activates, dim non-essential UI, show a minimal task focus overlay. Timer ring pulses slowly. Exit button clears Zone.", tags:["new","bl","ui","p2"] },
      { id:"u3", name:"Dark Mana corruption indicator", desc:"Corrupted shadows show a red overlay on their card in the Shadow Army view. Tooltip explains corruption and cost to cleanse.", tags:["improve","ui","p2"] },
      { id:"u4", name:"Season HUD (Nightmare)", desc:"Persistent season timer bar in header. Shows days remaining, current DM vs 100 cap, and shadow count. Red when DM > 70.", tags:["new","ui","p1"] },
      { id:"u5", name:"Safe week indicator (Easy)", desc:"Calendar dot shows which week is the monthly safe week. Active safe week shows a soft green banner in Dashboard.", tags:["new","ui","p3"] },
      { id:"u6", name:"Rival profile card", desc:"Mini card on Dashboard showing rival's weekly XP vs yours. Flashes amber when rival is ahead.", tags:["new","bl","ui","p3"] },
      { id:"u7", name:"Debt forgiveness animation (Easy)", desc:"When 5 DM auto-clears after 7 clean days, show a brief system message: 'The System acknowledges your discipline.' DM counter animates down.", tags:["new","ui","p3"] },
    ]
  },
  {
    section: "Infrastructure",
    items: [
      { id:"i1", name:"modeConfig object", desc:"Single source of truth for all mode parameters: xpMultiplier, decay, gracePeriod, dmOnFail, deceasedThreshold, postponeEnabled, rankDownEnabled etc.", tags:["new","core","p1"] },
      { id:"i2", name:"Season record table", desc:"Persist per-season stats: mode, startDate, endDate, result, shadowDeaths, peakDM, finalXP, rank. Required for Nightmare Oracle awareness.", tags:["new","core","p1"] },
      { id:"i3", name:"Ego score column", desc:"Add ego_score integer to user profile table. Updated on task self-rating + completion. Used for Ego Burst trigger.", tags:["new","bl","core","p1"] },
      { id:"i4", name:"Rival table", desc:"Simple join: user_id → rival_user_id (or rival_xp_target int). Weekly XP compared in Dashboard heartbeat sweep.", tags:["new","bl","core","p2"] },
      { id:"i5", name:"Permanent record log", desc:"append-only table: user_id, event_type (shadow_death, defeat, judgment_refused), timestamp, metadata. Nightmare only. Oracle reads this.", tags:["new","core","p2"] },
    ]
  },
];

let filter = 'all';
let done = new Set(JSON.parse(localStorage.getItem('sm_done') || '[]'));

function save() { try { localStorage.setItem('sm_done', JSON.stringify([...done])); } catch(e){} }

function countItems() {
  let total = 0, completed = 0, newF = 0, imp = 0;
  ITEMS.forEach(s => s.items.forEach(it => {
    total++;
    if (done.has(it.id)) completed++;
    if (it.tags.includes('new')) newF++;
    if (it.tags.includes('improve')) imp++;
  }));
  return { total, completed, newF, imp };
}

function render() {
  const { total, completed, newF, imp } = countItems();
  const pct = total ? Math.round(completed / total * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-lbl').textContent = completed + ' of ' + total + ' objectives cleared';
  document.getElementById('prog-pct').textContent = pct + '%';

  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="stat-l">Total</div><div class="stat-v">${total}</div></div>
    <div class="stat"><div class="stat-l">Cleared</div><div class="stat-v">${completed}</div></div>
    <div class="stat"><div class="stat-l">New features</div><div class="stat-v">${newF}</div></div>
    <div class="stat"><div class="stat-l">Improvements</div><div class="stat-v">${imp}</div></div>
  `;

  const list = document.getElementById('list');
  list.innerHTML = '';
  let anyVisible = false;

  ITEMS.forEach(sec => {
    const visible = sec.items.filter(it => filter === 'all' || it.tags.includes(filter));
    if (!visible.length) return;
    anyVisible = true;

    const lbl = document.createElement('div');
    lbl.className = 'section-lbl';
    lbl.textContent = sec.section;
    list.appendChild(lbl);

    visible.forEach(it => {
      const isDone = done.has(it.id);
      const div = document.createElement('div');
      div.className = 'todo-item' + (isDone ? ' done' : '');
      div.innerHTML = `
        <div class="chk ${isDone ? 'checked' : ''}"><i class="ti ti-check" aria-hidden="true"></i></div>
        <div class="ti-main">
          <div class="ti-name">${it.name}</div>
          <div class="ti-desc">${it.desc}</div>
          <div class="ti-meta">
            ${it.tags.map(t => tagHtml(t)).join('')}
          </div>
        </div>
      `;
      div.onclick = () => {
        if (done.has(it.id)) done.delete(it.id);
        else done.add(it.id);
        save(); render();
      };
      list.appendChild(div);
    });
  });

  if (!anyVisible) {
    list.innerHTML = '<div class="empty">No objectives match this filter.</div>';
  }
}

function tagHtml(t) {
  const map = {
    new: ['tag-new','new feature'],
    improve: ['tag-improve','improvement'],
    bl: ['tag-bl','blue lock'],
    core: ['tag-core','core logic'],
    ui: ['tag-ui','ui / ux'],
    p1: ['tag-p1','priority 1'],
    p2: ['tag-p2','priority 2'],
    p3: ['tag-p3','priority 3'],
  };
  const [cls, label] = map[t] || ['tag-gray', t];
  return `<span class="tag ${cls}">${label}</span>`;
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

render();
</script>
