services:
  - type: static
    name: solo-leveling-second-brain
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    # Routing for SPA (React Router)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
