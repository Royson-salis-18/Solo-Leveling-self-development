<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:28px 18px 60px;overflow-x:hidden;background:#06060a}
#goo{position:fixed;inset:0;pointer-events:none;z-index:0}
.page{position:relative;z-index:1}
.sec{font-size:8px;letter-spacing:4px;color:rgba(255,255,255,.2);text-transform:uppercase;margin-bottom:16px;font-weight:700}
.hr{height:1px;background:rgba(255,255,255,.05);margin:36px 0}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.grid-5{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}

/* ── MONARCH / FACTION CARDS ── */
.monarch-card{border-radius:20px;padding:0;position:relative;overflow:hidden;cursor:pointer;min-height:220px;display:flex;flex-direction:column;justify-content:flex-end;transition:transform .35s ease,box-shadow .35s ease}
.monarch-card:hover{transform:translateY(-5px)}
.mc-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:.5}
.mc-top-bar{position:absolute;top:0;left:0;right:0;height:3px;z-index:3}
.mc-body{position:relative;z-index:2;padding:20px 18px 18px}
.mc-icon{font-size:32px;margin-bottom:10px;display:block;line-height:1}
.mc-faction{font-size:8px;letter-spacing:3px;text-transform:uppercase;font-weight:700;margin-bottom:6px;opacity:.6}
.mc-name{font-size:17px;font-weight:800;letter-spacing:.3px;margin-bottom:3px}
.mc-title{font-size:10px;opacity:.4;letter-spacing:.5px}
.mc-badge{position:absolute;top:16px;right:16px;z-index:3;font-size:8px;letter-spacing:2px;padding:4px 9px;border-radius:20px;font-weight:700;text-transform:uppercase}
.mc-shine{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.07) 0%,transparent 50%);pointer-events:none;z-index:1;border-radius:20px}

/* ── RANK CARDS ── */
.rank-card{border-radius:16px;padding:22px 16px 18px;position:relative;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;transition:transform .3s ease}
.rank-card:hover{transform:translateY(-4px) scale(1.03)}
.rc-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:.45}
.rc-shine{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.08) 0%,transparent 55%);pointer-events:none;z-index:1;border-radius:16px}
.rc-letter{position:relative;z-index:2;font-size:52px;font-weight:900;letter-spacing:-2px;line-height:1}
.rc-label{position:relative;z-index:2;font-size:8px;letter-spacing:3px;text-transform:uppercase;margin-top:6px;font-weight:700;opacity:.6}
.rc-stars{position:relative;z-index:2;margin-top:8px;display:flex;gap:3px}
.rc-star{width:6px;height:6px;border-radius:50%}
.rc-border-glow{position:absolute;inset:0;border-radius:16px;pointer-events:none;z-index:3}

/* ── ENTITY CARDS (gate, dungeon, shadow, item) ── */
.entity-card{border-radius:18px;padding:20px 16px 16px;position:relative;overflow:hidden;cursor:pointer;min-height:180px;display:flex;flex-direction:column;justify-content:flex-end;transition:transform .3s}
.entity-card:hover{transform:translateY(-4px)}
.ec-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:.45}
.ec-shine{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 55%);pointer-events:none;z-index:1;border-radius:18px}
.ec-tag{font-size:7px;letter-spacing:3px;text-transform:uppercase;font-weight:700;margin-bottom:8px;position:relative;z-index:2;opacity:.55}
.ec-name{font-size:15px;font-weight:800;position:relative;z-index:2;margin-bottom:3px}
.ec-sub{font-size:10px;opacity:.35;position:relative;z-index:2;letter-spacing:.3px}
.ec-pip{position:absolute;top:14px;right:14px;z-index:2;width:8px;height:8px;border-radius:50%}

/* ── STAT CARD ── */
.stat-card{border-radius:14px;padding:16px;position:relative;overflow:hidden;cursor:pointer;transition:transform .3s}
.stat-card:hover{transform:translateY(-3px)}
.stat-label{font-size:8px;letter-spacing:3px;text-transform:uppercase;opacity:.4;margin-bottom:6px;font-weight:700}
.stat-val{font-size:26px;font-weight:900;letter-spacing:-1px}
.stat-bar-wrap{margin-top:10px;height:3px;border-radius:2px;background:rgba(255,255,255,.08);overflow:hidden}
.stat-bar{height:100%;border-radius:2px;transition:width .8s ease}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#16161e;border:1px solid rgba(255,255,255,.1);border-radius:30px;padding:7px 16px;font-size:11px;color:rgba(255,255,255,.55);pointer-events:none;opacity:0;transition:opacity .3s;z-index:999}
.toast.show{opacity:1}
</style>

const gc=document.getElementById('goo'),gx=gc.getContext('2d');
let GW,GH;
function rsz(){GW=gc.width=window.innerWidth;GH=gc.height=Math.max(window.innerHeight,document.body.scrollHeight+300)}
window.addEventListener('resize',()=>setTimeout(rsz,100));setTimeout(rsz,400);
const blobs=Array.from({length:7},()=>({x:Math.random()*900,y:Math.random()*900,vx:(Math.random()-.5)*.18,vy:(Math.random()-.5)*.18,r:100+Math.random()*200,ph:Math.random()*Math.PI*2,sp:.003+Math.random()*.005}));
const tendrils=Array.from({length:10},()=>({x:Math.random()*900,y:Math.random()*1000,wb:Math.random()*Math.PI*2,sp:.003+Math.random()*.005,len:60+Math.random()*120,w:1.5+Math.random()*5,al:.05+Math.random()*.1}));
let gt=0;
(function gl(){gt++;gx.clearRect(0,0,GW,GH);
for(const b of blobs){b.ph+=b.sp;b.x+=b.vx+Math.sin(b.ph*.7)*.3;b.y+=b.vy+Math.cos(b.ph*.5)*.3;if(b.x<-b.r)b.x=GW+b.r;if(b.x>GW+b.r)b.x=-b.r;if(b.y<-b.r)b.y=GH+b.r;if(b.y>GH+b.r)b.y=-b.r;const rr=b.r*(0.85+Math.sin(b.ph)*.15);const g=gx.createRadialGradient(b.x,b.y,0,b.x,b.y,rr);g.addColorStop(0,'rgba(0,0,0,.55)');g.addColorStop(.5,'rgba(0,0,0,.25)');g.addColorStop(1,'rgba(0,0,0,0)');gx.fillStyle=g;gx.beginPath();gx.arc(b.x,b.y,rr,0,Math.PI*2);gx.fill()}
for(const td of tendrils){td.wb+=td.sp;const pts=[];let cx=td.x,cy=td.y;for(let i=0;i<13;i++){const t=i/13;pts.push([cx+Math.sin(td.wb+t*3)*17*(1-t),cy]);cy+=td.len/13;cx+=Math.sin(td.wb*.5+i)*2.5}const tip=pts[pts.length-1],br=td.w*2*(0.7+Math.sin(td.wb*2)*.3);const bg=gx.createRadialGradient(tip[0],tip[1],0,tip[0],tip[1],br*2);bg.addColorStop(0,`rgba(0,0,0,${td.al*1.5})`);bg.addColorStop(1,'rgba(0,0,0,0)');gx.fillStyle=bg;gx.beginPath();gx.arc(tip[0],tip[1],br*2,0,Math.PI*2);gx.fill();for(let i=0;i<pts.length-1;i++){const t=i/(pts.length-1);gx.lineWidth=td.w*(1-t*.7);gx.strokeStyle=`rgba(0,0,0,${td.al*(1-t*.4)})`;gx.lineCap='round';gx.beginPath();gx.moveTo(pts[i][0],pts[i][1]);gx.lineTo(pts[i+1][0],pts[i+1][1]);gx.stroke()}td.x+=Math.sin(td.wb*.3)*.35;td.y+=Math.cos(td.wb*.2)*.12;if(td.x<-60)td.x=GW+60;if(td.x>GW+60)td.x=-60;if(td.y<-td.len)td.y=GH;if(td.y>GH+td.len)td.y=-td.len}
requestAnimationFrame(gl)})();

/* ══ EFFECT ENGINE ══ */
function fx(canvas,etype,ecol,glow){
  const ctx=canvas.getContext('2d');let w,h;
  function rsz(){const r=canvas.parentElement.getBoundingClientRect();w=canvas.width=r.width;h=canvas.height=r.height}rsz();
  const col=ecol,gl=glow;
  if(etype==='shadow'||etype==='frost'){
    let pts=[],t=0;
    const tds=Array.from({length:3},()=>({x:w*.1+Math.random()*w*.8,ph:Math.random()*Math.PI*2,ht:Math.random()*35+18}));
    const sp=(init)=>{const c=col[Math.floor(Math.random()*col.length)];pts.push({x:Math.random()*w,y:init?Math.random()*h:h+5,vx:(Math.random()-.5)*1.0,vy:-(Math.random()*.65+.2),sz:Math.random()*10+4,a:0,mA:Math.random()*.22+.06,life:0,mL:Math.random()*100+70,wb:Math.random()*Math.PI*2,sp:Math.random()*.4+.7,c})};
    for(let i=0;i<15;i++)sp(true);
    (function loop(){t++;ctx.clearRect(0,0,w,h);if(Math.random()<.25)sp(false);
    const p=Math.sin(t*.04)*.5+.5;const bg=ctx.createRadialGradient(w/2,h,0,w/2,h,h);bg.addColorStop(0,`rgba(${gl},${.1*p})`);bg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);
    for(const td of tds){const tx=td.x+Math.sin(t*.025+td.ph)*10,ht=td.ht*(0.7+Math.sin(t*.04+td.ph)*.3);const[r,g,b]=col[0];const tg=ctx.createLinearGradient(tx,h,tx,h-ht);tg.addColorStop(0,`rgba(${r},${g},${b},${.2*p})`);tg.addColorStop(1,`rgba(${r},${g},${b},0)`);ctx.fillStyle=tg;ctx.beginPath();ctx.ellipse(tx,h-ht*.25,4,ht,0,0,Math.PI*2);ctx.fill()}
    pts=pts.filter(p=>p.life<p.mL);for(const p of pts){p.life++;p.wb+=.04;const tt=p.life/p.mL;p.a=tt<.1?(tt/.1)*p.mA:p.mA*(1-(tt-.1)/.9);p.x+=p.vx+Math.sin(p.wb)*.9;p.y+=p.vy;const sz=p.sz*(1+tt*.2);const[r,g,b]=p.c;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.wb*.2);ctx.globalAlpha=p.a;ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.beginPath();ctx.ellipse(0,0,sz*p.sp,sz,0,0,Math.PI*2);ctx.fill();ctx.restore()}
    requestAnimationFrame(loop)})();return;
  }
  if(etype==='flame'){
    let pts=[],t=0;
    const sp=(init)=>{const c=col[Math.floor(Math.random()*col.length)];pts.push({x:w*.15+Math.random()*w*.7,y:init?Math.random()*h:h+5,vx:(Math.random()-.5)*.6,vy:-(Math.random()*1.2+.45),sz:Math.random()*7+3,a:0,mA:Math.random()*.28+.07,life:0,mL:Math.random()*75+50,wb:Math.random()*Math.PI*2,c})};
    for(let i=0;i<18;i++)sp(true);
    (function loop(){t++;ctx.clearRect(0,0,w,h);if(Math.random()<.28)sp(false);
    const p=Math.sin(t*.05)*.5+.5;const bg=ctx.createRadialGradient(w/2,h,0,w/2,h,h*.65);bg.addColorStop(0,`rgba(${gl},${.09*p})`);bg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);
    pts=pts.filter(p=>p.life<p.mL);for(const p of pts){p.life++;p.wb+=.07;const tt=p.life/p.mL;p.a=tt<.15?(tt/.15)*p.mA:p.mA*(1-(tt-.15)/.85);p.x+=p.vx+Math.sin(p.wb)*.45;p.y+=p.vy;const sz=p.sz*(1-tt*.4);const[r,g,b]=p.c;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(Math.sin(p.wb)*.22);const fg=ctx.createRadialGradient(0,0,0,0,-sz,sz*1.7);fg.addColorStop(0,`rgba(${r},${g},${b},${p.a})`);fg.addColorStop(.5,`rgba(${r},${g},${b},${p.a*.3})`);fg.addColorStop(1,`rgba(${r},${g},${b},0)`);ctx.beginPath();ctx.ellipse(0,0,sz*.55,sz*1.5,0,0,Math.PI*2);ctx.fillStyle=fg;ctx.fill();ctx.restore()}
    requestAnimationFrame(loop)})();return;
  }
  if(etype==='smoke'){
    let pts=[],t=0;
    const sp=(init)=>{const c=col[Math.floor(Math.random()*col.length)];pts.push({x:w*.05+Math.random()*w*.9,y:init?Math.random()*h:h+5,vx:(Math.random()-.5)*.4,vy:-(Math.random()*.38+.12),sz:Math.random()*16+9,a:0,mA:Math.random()*.14+.04,life:0,mL:Math.random()*140+90,wb:Math.random()*Math.PI*2,rot:(Math.random()-.5)*.01,c})};
    for(let i=0;i<14;i++)sp(true);
    (function loop(){t++;ctx.clearRect(0,0,w,h);if(Math.random()<.2)sp(false);
    pts=pts.filter(p=>p.life<p.mL);for(const p of pts){p.life++;p.wb+=p.rot;const tt=p.life/p.mL;p.a=tt<.2?(tt/.2)*p.mA:tt<.7?p.mA:p.mA*(1-(tt-.7)/.3);p.x+=p.vx+Math.sin(p.wb*.5)*.3;p.y+=p.vy;const sz=p.sz*(1+tt*.9);const[r,g,b]=p.c;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.wb);const sg=ctx.createRadialGradient(0,0,0,0,0,sz);sg.addColorStop(0,`rgba(${r},${g},${b},${p.a})`);sg.addColorStop(.55,`rgba(${r},${g},${b},${p.a*.3})`);sg.addColorStop(1,`rgba(${r},${g},${b},0)`);ctx.beginPath();ctx.arc(0,0,sz,0,Math.PI*2);ctx.fillStyle=sg;ctx.fill();ctx.restore()}
    requestAnimationFrame(loop)})();return;
  }
  if(etype==='lightning'){
    let bolts=[],orbs=[],t=0;
    const sb=()=>{const x=w*.15+Math.random()*w*.7;const segs=[];let cx=x,cy=0;while(cy<h+10){const nx=cx+(Math.random()-.5)*40,ny=cy+Math.random()*22+10;segs.push([cx,cy,nx,ny]);cx=nx;cy=ny}const brs=[];if(segs.length>3){const bi=Math.floor(segs.length*.35+Math.random()*segs.length*.3);let[,,bcx,bcy]=segs[bi];const bs=[];for(let i=0;i<3;i++){const bnx=bcx+(Math.random()-.5)*25,bny=bcy+Math.random()*15+4;bs.push([bcx,bcy,bnx,bny]);bcx=bnx;bcy=bny}brs.push(bs)}const[r,g,b]=col[Math.floor(Math.random()*col.length)];bolts.push({segs,brs,alpha:.8,life:0,r,g,b})};
    for(let i=0;i<2;i++)orbs.push({x:w*.2+Math.random()*w*.6,y:h*.2+Math.random()*h*.6,radius:Math.random()*6+3,a:0,mA:Math.random()*.18+.06,life:0,mL:Math.random()*60+45,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,...(r=>({r,g:col[0][1],b:col[0][2]}))(col[0][0])});
    (function loop(){t++;ctx.clearRect(0,0,w,h);if(Math.random()<.045)sb();
    const p=Math.sin(t*.06)*.5+.5;const bg=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,h);bg.addColorStop(0,`rgba(${gl},${.07*p})`);bg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);
    for(const o of orbs){o.life++;const tt=o.life/o.mL;if(tt>=1){o.life=0;o.x=w*.2+Math.random()*w*.6;o.y=h*.2+Math.random()*h*.6}o.a=tt<.2?(tt/.2)*o.mA:o.mA*(1-(tt-.2)/.8);o.x+=o.vx;o.y+=o.vy;const og=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.radius*2.5);og.addColorStop(0,`rgba(${col[0][0]},${col[0][1]},${col[0][2]},${o.a})`);og.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=og;ctx.beginPath();ctx.arc(o.x,o.y,o.radius*2.5,0,Math.PI*2);ctx.fill()}
    bolts=bolts.filter(b=>b.life<15);for(const bolt of bolts){bolt.life++;bolt.alpha*=.74;ctx.save();ctx.globalAlpha=bolt.alpha;ctx.strokeStyle=`rgba(${bolt.r},${bolt.g},${bolt.b},.18)`;ctx.lineWidth=5;ctx.lineCap='round';for(const[x1,y1,x2,y2]of bolt.segs){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}ctx.strokeStyle=`rgb(${bolt.r},${bolt.g},${bolt.b})`;ctx.lineWidth=bolt.life<3?1.8:.8;for(const[x1,y1,x2,y2]of bolt.segs){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}ctx.strokeStyle=`rgba(${bolt.r},${bolt.g},${bolt.b},.4)`;ctx.lineWidth=.6;for(const bs of bolt.brs)for(const[x1,y1,x2,y2]of bs){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}ctx.restore()}
    requestAnimationFrame(loop)})();
  }
}

/* ══ BUILD MONARCHS ══ */
const mg=document.getElementById('monarchs');
MONARCHS.forEach(m=>{
  const d=document.createElement('div');d.className='monarch-card';
  d.style.background=m.bg;
  d.innerHTML=`<canvas class="mc-canvas"></canvas><div class="mc-top-bar" style="background:${m.topBar}"></div><div class="mc-shine"></div>
  <div class="mc-badge" style="background:${m.badgeBg};color:${m.badgeCol};border:1px solid ${m.badgeCol}33">${m.badge}</div>
  <div class="mc-body">
    <span class="mc-icon" style="color:${m.accent}">${m.icon}</span>
    <div class="mc-faction" style="color:${m.accent}">${m.faction}</div>
    <div class="mc-name" style="color:${m.textHi}">${m.name}</div>
    <div class="mc-title" style="color:${m.textLo}">${m.title}</div>
  </div>`;
  d.onclick=()=>toast(`background:${m.bg}`);
  mg.appendChild(d);
  const cv=d.querySelector('.mc-canvas');
  const io=new IntersectionObserver(e=>{if(e[0].isIntersecting){fx(cv,m.etype,m.ecol,m.glow);io.disconnect()}},{threshold:.05});
  io.observe(d);
});

/* ══ BUILD RANKS ══ */
const rg=document.getElementById('ranks');
RANKS.forEach(r=>{
  const d=document.createElement('div');d.className='rank-card';
  d.style.cssText=`background:${r.bg};box-shadow:0 0 20px rgba(${r.glow},.12),inset 0 0 30px rgba(${r.glow},.06);border:1px solid rgba(${r.glow},.18)`;
  const stars=Array(r.stars).fill(`<div class="rc-star" style="background:${r.color};box-shadow:0 0 4px ${r.color}66"></div>`).join('');
  d.innerHTML=`<canvas class="rc-canvas"></canvas><div class="rc-shine"></div>
  <div class="rc-letter" style="color:${r.color};text-shadow:0 0 20px ${r.color}66,0 0 40px ${r.color}33">${r.letter}</div>
  <div class="rc-label" style="color:${r.textHi}">${r.label}</div>
  <div class="rc-stars">${stars}</div>`;
  d.onclick=()=>toast(`${r.letter}-Rank: ${r.color}`);
  rg.appendChild(d);
  if(r.etype!=='none'){
    const cv=d.querySelector('.rc-canvas');
    const io=new IntersectionObserver(e=>{if(e[0].isIntersecting){fx(cv,r.etype,[[parseInt(r.color.slice(1,3),16)||100,parseInt(r.color.slice(3,5),16)||0,parseInt(r.color.slice(5,7),16)||0]],r.glow);io.disconnect()}},{threshold:.05});
    io.observe(d);
  }
});

/* ══ BUILD STATS ══ */
const stg=document.getElementById('stats');
STATS.forEach(s=>{
  const d=document.createElement('div');d.className='stat-card';
  d.style.cssText=`background:${s.bg};border:1px solid rgba(${s.color.replace('#','').match(/../g).map(x=>parseInt(x,16)).join(',')},.15)`;
  d.innerHTML=`<div class="stat-label" style="color:${s.color}">${s.label}</div>
  <div class="stat-val" style="color:rgba(255,255,255,.85)">${s.val}</div>
  <div class="stat-bar-wrap"><div class="stat-bar" style="width:0%;background:linear-gradient(90deg,${s.color},${s.color}88)" data-pct="${s.pct}"></div></div>`;
  d.onclick=()=>toast(`${s.label}: ${s.color}`);
  stg.appendChild(d);
  const io=new IntersectionObserver(e=>{if(e[0].isIntersecting){setTimeout(()=>{d.querySelector('.stat-bar').style.width=s.pct+'%'},100);io.disconnect()}},{threshold:.1});
  io.observe(d);
});
